[project]
name = "ht-sc"
version = "1.0.0"
description = "نظام إدارة حافلات صالة الحج — واجهة طرفية تفاعلية"
requires-python = ">=3.12"
dependencies = [
    "arabic-reshaper>=3.0.0",
    "kaleido>=1.2.0",
    "openpyxl>=3.1.5",
    "pandas>=2.3.0",
    "plotly>=6.6.0",
    "python-bidi>=0.6.7",
    "reportlab>=4.4.10",
    "xlsxwriter>=3.2.9",
]

[project.optional-dependencies]
dev = [
    "mypy>=1.15.0",
    "pytest>=8.0.0",
    "ruff>=0.15.0",
]

[project.scripts]
ht-sc = "main:main"

[tool.ruff]
line-length = 120
target-version = "py312"
src = [
    "scripts",
]

[tool.ruff.lint]
select = [
    "ANN",
    "ARG",
    "B",
    "BLE",
    "C4",
    "C90",
    "D",
    "DTZ",
    "E",
    "F",
    "I",
    "N",
    "PERF",
    "PLC",
    "PLE",
    "PLR",
    "PLW",
    "PTH",
    "RUF",
    "S",
    "SIM",
    "T20",
    "TRY",
    "UP",
    "W",
]
ignore = [
    "D400",
    "D415",
    "DTZ001",
    "DTZ005",
    "E402",
    "PLC0415",
    "PLR0911",
    "PLR0912",
    "PLR0915",
    "PLR2004",
    "PLW0602",
    "PLW0603",
    "RUF001",
    "RUF002",
    "RUF003",
    "S605",
    "S606",
    "S607",
    "T201",
    "TRY300",
]

[tool.ruff.lint.per-file-ignores]
"main.py" = [
    "ANN",
    "BLE001",
    "F403",
    "F405",
]
"scripts/common.py" = [
    "ANN",
    "BLE001",
    "C901",
    "E501",
    "E741",
    "F403",
    "F405",
    "PTH",
    "S110",
